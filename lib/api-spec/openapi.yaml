openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: GradHub API – student project & teammate finder for Ain Shams Engineering
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication operations
  - name: users
    description: User profile operations
  - name: projects
    description: Project operations
  - name: connections
    description: Connect request operations
  - name: notifications
    description: In-app notification operations
  - name: admin
    description: Admin operations
  - name: applications
    description: Project application operations
  - name: meta
    description: Static metadata (skills, majors)

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # ── Auth ──────────────────────────────────────────────────────────────
  /auth/signup:
    post:
      operationId: signup
      tags: [auth]
      summary: Register a new student account
      description: Restricted to @eng.asu.edu.eg email addresses — any other domain is rejected
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SignupInput"
      responses:
        "201":
          description: Account created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "400":
          description: Validation error or domain restriction
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "409":
          description: Email already in use
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Log in with email and password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginInput"
      responses:
        "200":
          description: Logged in
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /auth/verify-email:
    post:
      operationId: verifyEmail
      tags: [auth]
      summary: Verify a signup email using a 6-digit code
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                pendingRegistrationToken:
                  type: string
                otp:
                  type: string
              required: [pendingRegistrationToken, otp]
      responses:
        "200":
          description: Email verified successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "400":
          description: Invalid or expired code
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      summary: Log out the current session
      responses:
        "200":
          description: Logged out
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get the current authenticated user
      responses:
        "200":
          description: Current user profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProfileView"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  # ── Users ─────────────────────────────────────────────────────────────
  /users:
    get:
      operationId: listUsers
      tags: [users]
      summary: List student profiles (public view — no contact info)
      parameters:
        - in: query
          name: skills
          schema:
            type: string
          description: Comma-separated skill tags to filter by
        - in: query
          name: major
          schema:
            type: string
          description: Major to filter by
        - in: query
          name: search
          schema:
            type: string
          description: Free-text search across name and bio
        - in: query
          name: track
          schema:
            type: string
          description: Filter users by track
        - in: query
          name: connectionStatus
          schema:
            type: string
            enum: [pending_sent, pending_received, connected, all]
          description: Filter users by connection status relative to the authenticated viewer
      responses:
        "200":
          description: List of profiles
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ProfileView"

  /users/{id}:
    get:
      operationId: getUser
      tags: [users]
      summary: Get a user profile (contact info included only if connected)
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: User profile (contact conditionally included)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserDetailView"
        "404":
          description: User not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /users/{id}/profile:
    patch:
      operationId: updateProfile
      tags: [users]
      summary: Update own profile
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProfileUpdate"
      responses:
        "200":
          description: Updated profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProfileView"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  # ── Projects ──────────────────────────────────────────────────────────
  /projects:
    get:
      operationId: listProjects
      tags: [projects]
      summary: List projects
      parameters:
        - in: query
          name: skills
          schema:
            type: string
          description: Comma-separated required-skill tags to filter by
        - in: query
          name: status
          schema:
            type: string
            enum: [open, closed]
          description: Filter by project status
        - in: query
          name: search
          schema:
            type: string
          description: Free-text search across title and description
        - in: query
          name: track
          schema:
            type: string
          description: Filter projects by track
      responses:
        "200":
          description: List of projects
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Project"

    post:
      operationId: createProject
      tags: [projects]
      summary: Create a new project
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProjectInput"
      responses:
        "201":
          description: Project created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /projects/{id}:
    get:
      operationId: getProject
      tags: [projects]
      summary: Get a project by ID
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Project detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectDetail"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

    patch:
      operationId: updateProject
      tags: [projects]
      summary: Update a project (owner only)
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProjectUpdate"
      responses:
        "200":
          description: Updated project
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

    delete:
      operationId: deleteProject
      tags: [projects]
      summary: Delete a project (owner only)
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /applications:
    post:
      operationId: createApplication
      tags: [applications]
      summary: Apply to a project
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProjectApplicationInput"
      responses:
        "201":
          description: Application created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectApplication"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "409":
          description: Conflict or duplicate application
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /projects/{id}/applications:
    get:
      operationId: listProjectApplications
      tags: [applications]
      summary: List pending applications for a project
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Project applications with applicant details
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ProjectApplicationApplicantView"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "404":
          description: Project not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /applications/mine:
    get:
      operationId: listMyApplications
      tags: [applications]
      summary: List applications for the current user
      responses:
        "200":
          description: Current user's applications
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ProjectApplication"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /applications/{id}:
    patch:
      operationId: updateApplication
      tags: [applications]
      summary: Update an application decision or leave a project
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ApplicationDecision"
      responses:
        "200":
          description: Updated application
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectApplication"
        "400":
          description: Invalid action or state
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
  /connections:
    get:
      operationId: listConnections
      tags: [connections]
      summary: List all connect requests for the current user (incoming and outgoing)
      responses:
        "200":
          description: Connection requests
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConnectionList"

    post:
      operationId: sendConnection
      tags: [connections]
      summary: Send a connect request to another user (optionally scoped to a project)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ConnectionInput"
      responses:
        "201":
          description: Request sent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConnectRequest"
        "409":
          description: A pending or accepted request already exists
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /connections/{id}:
    patch:
      operationId: respondConnection
      tags: [connections]
      summary: Accept or decline a connect request (recipient only)
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ConnectionResponse"
      responses:
        "200":
          description: Updated request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConnectRequest"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  # ── Notifications ─────────────────────────────────────────────────────
  /notifications:
    get:
      operationId: listNotifications
      tags: [notifications]
      summary: List in-app notifications for the current user
      responses:
        "200":
          description: Notifications
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Notification"

  /notifications/{id}/read:
    patch:
      operationId: markNotificationRead
      tags: [notifications]
      summary: Mark a notification as read
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Notification marked read
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Notification"

  # ── Dashboard summary (wow endpoint) ─────────────────────────────────
  /dashboard/stats:
    get:
      operationId: getDashboardStats
      tags: [users]
      summary: Aggregated dashboard stats for the current user
      responses:
        "200":
          description: Stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardStats"

  # ── Admin ─────────────────────────────────────────────────────────────
  /admin/users:
    get:
      operationId: adminListUsers
      tags: [admin]
      summary: Admin – list all users
      responses:
        "200":
          description: All users
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/UserDetailView"

  /admin/users/{id}:
    delete:
      operationId: adminDeleteUser
      tags: [admin]
      summary: Admin – remove a user
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /admin/projects:
    get:
      operationId: adminListProjects
      tags: [admin]
      summary: Admin – list all projects
      responses:
        "200":
          description: All projects
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Project"

  /admin/projects/{id}:
    delete:
      operationId: adminDeleteProject
      tags: [admin]
      summary: Admin – remove a project
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  # ── Meta ──────────────────────────────────────────────────────────────
  /meta/skills:
    get:
      operationId: listSkillTags
      tags: [meta]
      summary: List all available skill tags
      responses:
        "200":
          description: Skill tags
          content:
            application/json:
              schema:
                type: array
                items:
                  type: string

  /meta/majors:
    get:
      operationId: listMajors
      tags: [meta]
      summary: List all available majors
      responses:
        "200":
          description: Majors
          content:
            application/json:
              schema:
                type: array
                items:
                  type: string

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ApiError:
      type: object
      properties:
        error:
          type: string
      required:
        - error

    MessageResponse:
      type: object
      properties:
        message:
          type: string
      required:
        - message

    # ── Auth ────────────────────────────────────────────────────────────
    SignupInput:
      type: object
      required: [name, email, password, major, skills]
      properties:
        name:
          type: string
          minLength: 2
        email:
          type: string
          format: email
          description: Must end with @eng.asu.edu.eg
        password:
          type: string
          minLength: 8
        major:
          type: string
        skills:
          type: array
          items:
            type: string
        bio:
          type: string
        phone:
          type: ["string", "null"]
        linkedinUrl:
          type: ["string", "null"]
          format: uri

    LoginInput:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string

    AuthResponse:
      type: object
      required: [token, user]
      properties:
        token:
          type: string
        user:
          $ref: "#/components/schemas/ProfileView"

    # ── Profile ─────────────────────────────────────────────────────────
    ProfileView:
      type: object
      description: Public-safe user view – never includes email or phone
      required: [id, name, major, skills, role, createdAt, connectStatus]
      properties:
        id:
          type: integer
        name:
          type: string
        major:
          type: string
        skills:
          type: array
          items:
            type: string
        bio:
          type: ["string", "null"]
        cvLink:
          type: ["string", "null"]
          format: uri
        linkedinUrl:
          type: ["string", "null"]
          format: uri
        track:
          type: ["string", "null"]
        customTrack:
          type: ["string", "null"]
        bylaw:
          type: ["string", "null"]
          enum: ["2018", "2023"]
        gender:
          type: ["string", "null"]
          enum: ["Male", "Female"]
        gpa:
          type: ["number", "null"]
        role:
          type: string
          enum: [student, admin]
        createdAt:
          type: string
          format: date-time
        connectStatus:
          type: string
          enum: [none, pending_sent, pending_received, connected]
          description: Connect status relative to the authenticated viewer

    UserDetailView:
      type: object
      description: Profile view plus optional contact info when connected
      required: [id, name, major, skills, role, createdAt, connectStatus]
      properties:
        id:
          type: integer
        name:
          type: string
        major:
          type: string
        skills:
          type: array
          items:
            type: string
        bio:
          type: ["string", "null"]
        cvLink:
          type: ["string", "null"]
          format: uri
        linkedinUrl:
          type: ["string", "null"]
          format: uri
        track:
          type: ["string", "null"]
        customTrack:
          type: ["string", "null"]
        bylaw:
          type: ["string", "null"]
          enum: ["2018", "2023"]
        gender:
          type: ["string", "null"]
          enum: ["Male", "Female"]
        gpa:
          type: ["number", "null"]
        role:
          type: string
          enum: [student, admin]
        createdAt:
          type: string
          format: date-time
        connectStatus:
          type: string
          enum: [none, pending_sent, pending_received, connected]
        email:
          type: ["string", "null"]
          description: Only present when connected
        phone:
          type: ["string", "null"]
          description: Only present when connected and phone is set

    ProfileUpdate:
      type: object
      properties:
        name:
          type: string
        major:
          type: string
        skills:
          type: array
          items:
            type: string
        bio:
          type: ["string", "null"]
        phone:
          type: ["string", "null"]
        cvLink:
          type: ["string", "null"]
          format: uri
        linkedinUrl:
          type: ["string", "null"]
          format: uri
        track:
          type: ["string", "null"]
        customTrack:
          type: ["string", "null"]
        bylaw:
          type: ["string", "null"]
          enum: ["2018", "2023"]
        gender:
          type: ["string", "null"]
          enum: ["Male", "Female"]
        gpa:
          type: ["number", "null"]

    # ── Project ─────────────────────────────────────────────────────────
    Project:
      type: object
      required: [id, title, description, requiredSkills, status, ownerId, ownerName, teamSizeCap, maxMembers, createdAt]
      properties:
        id:
          type: integer
        title:
          type: string
        description:
          type: string
        requiredSkills:
          type: array
          items:
            type: string
        status:
          type: string
          enum: [open, closed]
        ownerId:
          type: integer
        ownerName:
          type: string
        leaderId:
          type: integer
        leaderName:
          type: ["string", "null"]
        teamSizeCap:
          type: integer
        maxMembers:
          type: integer
        memberCount:
          type: integer
        track:
          type: ["string", "null"]
        canApply:
          type: boolean
        isLeader:
          type: boolean
        isMember:
          type: boolean
        createdAt:
          type: string
          format: date-time

    ProjectDetail:
      type: object
      required: [id, title, description, requiredSkills, status, ownerId, ownerName, teamSizeCap, maxMembers, createdAt, connectStatus]
      properties:
        id:
          type: integer
        title:
          type: string
        description:
          type: string
        requiredSkills:
          type: array
          items:
            type: string
        status:
          type: string
          enum: [open, closed]
        ownerId:
          type: integer
        ownerName:
          type: string
        leaderId:
          type: integer
        leaderName:
          type: ["string", "null"]
        teamSizeCap:
          type: integer
        maxMembers:
          type: integer
        memberCount:
          type: integer
        track:
          type: ["string", "null"]
        canApply:
          type: boolean
        isLeader:
          type: boolean
        isMember:
          type: boolean
        createdAt:
          type: string
          format: date-time
        connectStatus:
          type: string
          enum: [none, pending_sent, pending_received, connected]
          description: Viewer's connect status with the project owner

    ProjectInput:
      type: object
      required: [title, description, requiredSkills, teamSizeCap]
      properties:
        title:
          type: string
          minLength: 3
        description:
          type: string
          minLength: 10
        requiredSkills:
          type: array
          items:
            type: string
        status:
          type: string
          enum: [open, closed]
          default: open
        teamSizeCap:
          type: integer
          minimum: 1
          maximum: 20

    ProjectUpdate:
      type: object
      properties:
        title:
          type: string
        description:
          type: string
        requiredSkills:
          type: array
          items:
            type: string
        status:
          type: string
          enum: [open, closed]
        teamSizeCap:
          type: integer

    ProjectApplication:
      type: object
      required: [id, applicantId, projectId, status, requestedAt]
      properties:
        id:
          type: integer
        applicantId:
          type: integer
        projectId:
          type: integer
        status:
          type: string
          enum: [pending, accepted, rejected, left, removed]
        requestedAt:
          type: string
          format: date-time
        decidedAt:
          type: ["string", "null"]
          format: date-time

    ProjectApplicationApplicantView:
      type: object
      required: [id, applicantId, projectId, status, requestedAt, applicantName, applicantSkills]
      properties:
        id:
          type: integer
        applicantId:
          type: integer
        projectId:
          type: integer
        status:
          type: string
          enum: [pending, accepted, rejected, left, removed]
        requestedAt:
          type: string
          format: date-time
        decidedAt:
          type: ["string", "null"]
          format: date-time
        applicantName:
          type: string
        applicantTrack:
          type: ["string", "null"]
        applicantCustomTrack:
          type: ["string", "null"]
        applicantSkills:
          type: array
          items:
            type: string
        applicantBio:
          type: ["string", "null"]
        applicantBylaw:
          type: ["string", "null"]
        applicantGender:
          type: ["string", "null"]

    ProjectApplicationInput:
      type: object
      required: [projectId]
      properties:
        projectId:
          type: integer

    ApplicationDecision:
      type: object
      required: [action]
      properties:
        action:
          type: string
          enum: [accepted, rejected, removed, left]

    # ── Connections ──────────────────────────────────────────────────────
    ConnectRequest:
      type: object
      required: [id, senderId, senderName, recipientId, recipientName, status, createdAt]
      properties:
        id:
          type: integer
        senderId:
          type: integer
        senderName:
          type: string
        recipientId:
          type: integer
        recipientName:
          type: string
        projectId:
          type: ["integer", "null"]
        projectTitle:
          type: ["string", "null"]
        status:
          type: string
          enum: [pending, accepted, declined]
        createdAt:
          type: string
          format: date-time

    ConnectionList:
      type: object
      required: [incoming, outgoing]
      properties:
        incoming:
          type: array
          items:
            $ref: "#/components/schemas/ConnectRequest"
        outgoing:
          type: array
          items:
            $ref: "#/components/schemas/ConnectRequest"

    ConnectionInput:
      type: object
      required: [recipientId]
      properties:
        recipientId:
          type: integer
        projectId:
          type: ["integer", "null"]

    ConnectionResponse:
      type: object
      required: [status]
      properties:
        status:
          type: string
          enum: [accepted, declined]

    # ── Notifications ────────────────────────────────────────────────────
    Notification:
      type: object
      required: [id, userId, message, read, createdAt]
      properties:
        id:
          type: integer
        userId:
          type: integer
        message:
          type: string
        read:
          type: boolean
        createdAt:
          type: string
          format: date-time

    # ── Dashboard stats (wow) ────────────────────────────────────────────
    DashboardStats:
      type: object
      required: [openProjects, totalStudents, myProjects, pendingRequests, unreadNotifications]
      properties:
        openProjects:
          type: integer
        totalStudents:
          type: integer
        myProjects:
          type: integer
        pendingRequests:
          type: integer
        unreadNotifications:
          type: integer
