kind = "web"
previewPath = "/"
title = "GradHub"
version = "1.0.0"
id = "artifacts/grad-hub"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18324

[services.development]
run = "pnpm --filter @workspace/grad-hub run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/grad-hub", "run", "build" ]
publicDir = "artifacts/grad-hub/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18324"
BASE_PATH = "/"
